<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    {% extends "learning_logs/base.html"%}
    {% block content %}
        {% if error %}
            <p> Seu login e senha estão incorretos. Por favor, tente novamente</p>
        {% endif %}

        <form action="{% url 'login' %}" method="POST" >
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Entrar</button>
        </form>
    {% endblock content %}
</body>
</html>
