{% extends "learning_logs/base.html" %}
{% load django_bootstrap5 %}

{% block header %}
    <h2>Adicione um novo tópico:</h2>
{% endblock header %}

{% block content %}
    <form action="{% url 'new_topic' %}" method="POST" class="form">
        {% csrf_token %}
        {% bootstrap_form form %}

        <div class="mt-3">
            <button type="submit" class="btn btn-primary w-100">Adicionar</button>
        </div>
    </form>
{% endblock content %}
