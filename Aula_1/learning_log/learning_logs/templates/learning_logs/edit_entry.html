{% extends "learning_logs/base.html" %}
{% load django_bootstrap5 %}

{% block header %}
    <h3>
        <a href="{% url 'topic' topic.id %}">{{ topic }}</a>
    </h3>
{% endblock header %}

{% block content %}
    <p>Editar anotação:</p>

    <form action="{% url 'edit_entry' entry.id %}" method="POST">
        {% csrf_token %}
        {% bootstrap_form form %}
        <div class="mt-3">
            <button type="submit" class="btn btn-primary w-100">Salvar</button>
        </div>
    </form>
{% endblock content %}
